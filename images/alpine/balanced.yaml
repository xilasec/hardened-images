contents:
  keyring:
    - https://alpinelinux.org/keys/alpine-devel@lists.alpinelinux.org-6165ee59.rsa.pub
    - https://alpinelinux.org/keys/alpine-devel@lists.alpinelinux.org-4a6a0840.rsa.pub
    - https://alpinelinux.org/keys/alpine-devel@lists.alpinelinux.org-5261cecb.rsa.pub
    # - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    - melange/xilasec@hardned-images.rsa.pub  # signs packages built by melange
  repositories:
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/main/
    # - '@wolfi https://packages.wolfi.dev/os'
    - '@local ./packages'  # melange-built packages take precedence over upstream
  packages:
    - busybox@local
    - musl@local

accounts:
  run-as: 1000
  users:
    - username: appuser
      uid: 1000
  groups:
    - groupname: appuser
      gid: 1000

entrypoint:
  command: /bin/sh

archs:
  - x86_64
