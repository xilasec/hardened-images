contents:
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    - melange/xilasec@hardned-images.rsa.pub  # signs packages built by melange
  repositories:
    - https://packages.wolfi.dev/os
    - '@local packages'  # melange-built packages take precedence
  packages:
    - wolfi-baselayout
    - ca-certificates-bundle
    # glibc-based equivalents of what ubuntu-noble provides:
    - glibc
    - openssl
    # packages built locally via melange go here

accounts:
  run-as: 1000
  users:
    - username: appuser
      uid: 1000
  groups:
    - groupname: appuser
      gid: 1000

entrypoint:
  command: /bin/false

archs:
  - x86_64
